<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Planner for Students</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9fafb;
      color: #333;
    }
    header {
      background: #2563eb;
      color: #fff;
      padding: 1.5rem;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    main {
      max-width: 700px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 0.5rem;
    }
    .checkbox-group label {
      font-weight: normal;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #1e4db7;
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Travel Planner for Students</h1>
    <p>Plan affordable, personalized trips with generative AI</p>
  </header>

  <main>
    <form>
      <label for="origin">Origin</label>
      <input type="text" id="origin" placeholder="Enter starting location" />

      <label for="destination">Destination</label>
      <input type="text" id="destination" placeholder="Enter destination" />

      <label for="start-date">Start Date</label>
      <input type="date" id="start-date" />

      <label for="days">Number of Days</label>
      <input type="number" id="days" min="1" value="1" />

      <label for="budget">Budget</label>
      <select id="budget">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <label>Interests</label>
      <div class="checkbox-group">
        <label><input type="checkbox" value="food" /> Food</label>
        <label><input type="checkbox" value="nature" /> Nature</label>
        <label><input type="checkbox" value="sightseeing" /> Sightseeing</label>
        <label><input type="checkbox" value="adventure" /> Adventure</label>
        <label><input type="checkbox" value="culture" /> Culture</label>
        <label><input type="checkbox" value="shopping" /> Shopping</label>
      </div>

      <button type="submit">Generate Itinerary</button>
    </form>
  </main>

  <!-- React will still hook into this -->
  <div id="root"></div>
</body>
</html>
